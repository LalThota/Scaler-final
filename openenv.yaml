name: "Adaptive Multi-Step CSOS++"
version: "1.0.0"
objective: "Simulate a real-world customer support system where an agent extracts intents, assigns priority, and routes to correct departments."
tasks:
  - id: "EASY-001"
    difficulty: "EASY"
    domain: "account_security"
    grader: "app.grader:grade_easy_task_score"
  - id: "MEDIUM-001"
    difficulty: "MEDIUM"
    domain: "saas_support"
    grader: "app.grader:grade_medium_task_score"
  - id: "HARD-001"
    difficulty: "HARD"
    domain: "enterprise_support"
    grader: "app.grader:grade_hard_task_score"
  - id: "EXTREME-001"
    difficulty: "EXTREME"
    domain: "incident_response"
    grader: "app.grader:grade_extreme_task_score"
api:
  port: 7860
  endpoints:
    reset: "/reset"
    step: "/step"
    state: "/state"
    debug: "/debug"
    health: "/health"
    metrics: "/metrics"
evaluation:
  metric: "avg_score"
  grader: "app.grader:grade_action_score"
  graders:
    default: "app.grader:grade_action_score"
    easy: "app.grader:grade_easy_task_score"
    medium: "app.grader:grade_medium_task_score"
    hard: "app.grader:grade_hard_task_score"
    extreme: "app.grader:grade_extreme_task_score"
  task_graders:
    EASY-001: "app.grader:grade_easy_task_score"
    MEDIUM-001: "app.grader:grade_medium_task_score"
    HARD-001: "app.grader:grade_hard_task_score"
    EXTREME-001: "app.grader:grade_extreme_task_score"
  max_steps_per_task: 8
  max_total_time_min: 20
